# SPDX-License-Identifier: AGPL-3.0-only
# The gate, continuously re-earned on two OSes. A green badge certifies these
# tests on this code on these runners — never that a name means what it says.
name: verify

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gate:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.10", "3.12"]
    runs-on: ${{ matrix.os }}
    env:
      PYTHONUTF8: "1"
      PYTHONHASHSEED: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Run the gate (stdlib only, no installs — offline by construction)
        run: python verify.py
