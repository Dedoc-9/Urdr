# SPDX-License-Identifier: AGPL-3.0-only
# The gate, continuously re-earned on two OSes. A green badge certifies these
# tests on this code on these runners — never that a name means what it says.
name: verify

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gate:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.10", "3.12"]
    runs-on: ${{ matrix.os }}
    env:
      PYTHONUTF8: "1"
      PYTHONHASHSEED: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Run the gate (stdlib only, no installs — offline by construction)
        # Assert the literal tail line, never the exit code alone: a truncated
        # verify.py once parsed cleanly and exited 0 while checking NOTHING
        # (incident 2026-07-13). pipefail keeps the exit-code semantics AND the
        # grep adds the "it actually ran to the end" proof. `exit-0 ≠ ran`.
        shell: bash
        run: |
          set -o pipefail
          python verify.py | tee gate.log
          grep -q "^GATE PASSED$" gate.log
